
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriJSON - Gestión de Archivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; }
        .nav-active { color: #4f46e5; border-top: 3px solid #4f46e5; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .menu-input { border: none; background: transparent; width: 100%; font-size: 0.875rem; color: #1e293b; padding: 6px 0; border-bottom: 1px solid #e2e8f0; }
        .menu-input:focus { outline: none; border-bottom: 2px solid #6366f1; }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .drop-zone.active { border-color: #6366f1; background: #eef2ff; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Pantalla de Carga de Archivo (Si no hay datos) -->
    <div id="setup-screen" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-file-import text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Cargar Base de Datos</h2>
            <p class="text-slate-500 text-sm mb-8">Selecciona tu archivo <span class="font-mono font-bold">database.json</span> para comenzar.</p>
            
            <label class="block w-full drop-zone rounded-3xl p-8 cursor-pointer hover:bg-slate-50 mb-4" id="drop-area">
                <i class="fas fa-cloud-upload-alt text-slate-300 text-4xl mb-4"></i>
                <span class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Toca para buscar</span>
                <input type="file" id="main-upload" class="hidden" accept=".json" onchange="handleFileSelect(event)">
            </label>
            
            <button onclick="skipSetup()" class="text-indigo-600 font-bold text-xs uppercase tracking-widest">O crear base de datos vacía</button>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-lg rounded-b-[2.5rem]">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <div>
                <h1 class="text-xl font-black tracking-tight">NutriJSON</h1>
                <p class="text-[10px] opacity-80 uppercase font-bold" id="current-date"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadDatabase()" class="bg-white/20 p-2.5 rounded-2xl backdrop-blur-md border border-white/10">
                    <i class="fas fa-save text-sm"></i>
                </button>
                <button onclick="openModal('weeks-modal')" class="bg-indigo-600 px-4 py-2.5 rounded-2xl text-xs font-black shadow-lg">
                    <span id="active-week-label">Semana 1</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-lg mx-auto p-4 space-y-6">
        <section id="view-today" class="view">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-lg font-black text-slate-800">Menú de Hoy</h2>
                <div id="completion-badge" class="bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-xl text-xs font-black">0/3</div>
            </div>
            <div class="space-y-4" id="daily-checklist"></div>
        </section>

        <section id="view-menu" class="view hidden">
            <h2 class="text-lg font-black text-slate-800 mb-5">Planificador Semanal</h2>
            <div class="space-y-4" id="weekly-accordion"></div>
        </section>

        <section id="view-progress" class="view hidden">
            <h2 class="text-lg font-black text-slate-800 mb-5">Peso</h2>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 mb-6">
                <canvas id="weightChart" height="200"></canvas>
            </div>
            <div class="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100">
                <div class="flex gap-3">
                    <input type="number" id="weight-input" step="0.1" class="flex-1 bg-white border-none rounded-2xl px-5 py-4 outline-none shadow-sm" placeholder="Kg">
                    <button onclick="addWeight()" class="bg-indigo-600 text-white px-8 rounded-2xl font-black transition-all active:scale-95">Añadir</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Navegación -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 safe-area-bottom flex justify-around items-center z-50">
        <button onclick="switchView('today')" id="nav-today" class="flex flex-col items-center py-4 w-full nav-active">
            <i class="fas fa-clipboard-check text-xl mb-1"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Hoy</span>
        </button>
        <button onclick="switchView('menu')" id="nav-menu" class="flex flex-col items-center py-4 w-full text-slate-400">
            <i class="fas fa-utensils text-xl mb-1"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Plan</span>
        </button>
        <button onclick="switchView('progress')" id="nav-progress" class="flex flex-col items-center py-4 w-full text-slate-400">
            <i class="fas fa-weight text-xl mb-1"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Peso</span>
        </button>
    </nav>

    <!-- Modal Semanas -->
    <div id="weeks-modal" class="fixed inset-0 bg-slate-900/80 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-7">
            <h3 class="text-xl font-black text-slate-800 mb-5">Semanas</h3>
            <div id="weeks-list" class="space-y-3 mb-6"></div>
            <button onclick="createNewWeek()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black mb-2">Nueva Semana</button>
            <button onclick="closeModal('weeks-modal')" class="w-full text-slate-400 font-bold text-xs uppercase py-2">Cerrar</button>
        </div>
    </div>

    <script>
        const DAYS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        const MEALS = [
            { id: 'b', name: 'Desayuno', icon: 'fa-sun', color: 'text-orange-500' },
            { id: 'l', name: 'Almuerzo', icon: 'fa-cloud-sun', color: 'text-blue-500' },
            { id: 'd', name: 'Cena', icon: 'fa-moon', color: 'text-indigo-500' }
        ];

        let db = null;

        // --- MANEJO DE ARCHIVOS ---
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    db = JSON.parse(e.target.result);
                    startApp();
                } catch (err) {
                    alert("Error: El archivo no es un JSON válido");
                }
            };
            reader.readAsText(file);
        }

        function skipSetup() {
            db = {
                metadata: { version: "2.0", lastSync: new Date().toISOString() },
                settings: { activeWeekId: 'w1' },
                weeks: { 'w1': { name: 'Semana 1', planning: {} } },
                tracking: { meals: {}, weight: [] }
            };
            startApp();
        }

        function startApp() {
            document.getElementById('setup-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('setup-screen').classList.add('hidden');
            }, 500);
            ensureStructure();
            renderAll();
            initChart();
            updateHeader();
        }

        function downloadDatabase() {
            if (!db) return;
            db.metadata.lastSync = new Date().toISOString();
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "database.json");
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        // --- LÓGICA DE LA APP ---
        function ensureStructure() {
            Object.keys(db.weeks).forEach(id => {
                if (!db.weeks[id].planning) db.weeks[id].planning = {};
                DAYS.forEach(day => {
                    if (!db.weeks[id].planning[day]) db.weeks[id].planning[day] = { b: '', l: '', d: '' };
                });
            });
        }

        function updateHeader() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
            document.getElementById('active-week-label').innerText = db.weeks[db.settings.activeWeekId].name;
        }

        function renderAll() {
            renderToday();
            renderMenu();
            renderWeeks();
        }

        function renderToday() {
            const container = document.getElementById('daily-checklist');
            const todayKey = new Date().toISOString().split('T')[0];
            const dayName = DAYS[(new Date().getDay() + 6) % 7];
            
            if (!db.history) db.history = {}; // Fix for legacy
            if (!db.tracking.meals[todayKey]) db.tracking.meals[todayKey] = { b: false, l: false, d: false };
            
            const currentPlan = db.weeks[db.settings.activeWeekId].planning[dayName];
            container.innerHTML = '';
            
            let done = 0;
            MEALS.forEach(m => {
                const checked = db.tracking.meals[todayKey][m.id];
                if (checked) done++;
                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-[1.8rem] border-2 transition-all flex items-center justify-between ${checked ? 'border-green-100 bg-green-50' : 'border-slate-50 shadow-sm'}`;
                card.onclick = () => { db.tracking.meals[todayKey][m.id] = !db.tracking.meals[todayKey][m.id]; renderToday(); };
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${checked ? 'bg-green-500 text-white' : 'bg-slate-50 ' + m.color}">
                            <i class="fas ${m.icon} text-lg"></i>
                        </div>
                        <div>
                            <h4 class="font-black text-slate-800 text-xs uppercase">${m.name}</h4>
                            <p class="text-xs text-slate-400">${currentPlan[m.id] || '---'}</p>
                        </div>
                    </div>
                    <div class="w-7 h-7 rounded-full border-2 ${checked ? 'border-green-500 bg-green-500' : 'border-slate-100'}">
                        ${checked ? '<i class="fas fa-check text-[10px] text-white flex justify-center mt-1.5"></i>' : ''}
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('completion-badge').innerText = `${done}/3`;
        }

        function renderMenu() {
            const container = document.getElementById('weekly-accordion');
            const planning = db.weeks[db.settings.activeWeekId].planning;
            container.innerHTML = '';
            DAYS.forEach(day => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-[2rem] shadow-sm mb-4 border border-slate-50 overflow-hidden";
                div.innerHTML = `
                    <div class="bg-slate-50 px-6 py-3 font-black text-slate-400 text-[10px] uppercase">${day}</div>
                    <div class="p-6 space-y-4">
                        ${MEALS.map(m => `
                            <div class="flex gap-4">
                                <i class="fas ${m.icon} ${m.color} mt-2 w-4"></i>
                                <input type="text" class="menu-input" placeholder="${m.name}..." value="${planning[day][m.id]}" 
                                    onchange="db.weeks[db.settings.activeWeekId].planning['${day}']['${m.id}'] = this.value; renderToday();">
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderWeeks() {
            const list = document.getElementById('weeks-list');
            list.innerHTML = '';
            Object.keys(db.weeks).forEach(id => {
                const active = db.settings.activeWeekId === id;
                const btn = document.createElement('button');
                btn.className = `w-full p-4 rounded-2xl flex justify-between font-bold text-sm ${active ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-600'}`;
                btn.onclick = () => { db.settings.activeWeekId = id; updateHeader(); renderAll(); closeModal('weeks-modal'); };
                btn.innerHTML = `${db.weeks[id].name} ${active ? '<i class="fas fa-check"></i>' : ''}`;
                list.appendChild(btn);
            });
        }

        function createNewWeek() {
            const id = 'w' + Date.now();
            db.weeks[id] = { name: 'Semana ' + (Object.keys(db.weeks).length + 1), planning: {} };
            db.settings.activeWeekId = id;
            ensureStructure(); renderAll(); updateHeader(); closeModal('weeks-modal');
        }

        // --- CHART & UTILS ---
        let chart;
        function initChart() {
            const ctx = document.getElementById('weightChart');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: db.tracking.weight.map(w => w.date),
                    datasets: [{ data: db.tracking.weight.map(w => w.val), borderColor: '#6366f1', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { display: false } } } }
            });
        }

        function addWeight() {
            const val = parseFloat(document.getElementById('weight-input').value);
            if (!val) return;
            const date = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
            db.tracking.weight.push({ date, val });
            chart.data.labels.push(date);
            chart.data.datasets[0].data.push(val);
            chart.update();
            document.getElementById('weight-input').value = '';
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-indigo-700'));
            document.getElementById('nav-' + id).classList.add('nav-active', 'text-indigo-700');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
